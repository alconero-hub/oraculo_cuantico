name: Oráculo Cuántico en Docker
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Construir y Correr Contenedor
        env:
          IBM_QUANTUM_TOKEN: ${{ secrets.IBM_QUANTUM_TOKEN }}
        run: |
          docker build -t q-bot .
          # Corremos el bot y le damos un nombre al contenedor para luego extraer el archivo
          docker run --name running-bot -e IBM_QUANTUM_TOKEN=${{ secrets.IBM_QUANTUM_TOKEN }} q-bot
          # Copiamos el CSV desde dentro del contenedor hacia afuera (al repo de GitHub)
          docker cp running-bot:/app/backtest_cuantico.csv ./backtest_cuantico.csv

      - name: Push de resultados
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add backtest_cuantico.csv
          git commit -m "Update backtest via Docker" || echo "No changes"
          git push
