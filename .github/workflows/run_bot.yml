name: Oráculo Cuántico Estable
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 📦 Instalación de Compatibilidad Total
        run: |
          pip install --upgrade pip
          # Instalamos la versión puente que tiene qiskit.qobj pero es moderna
          pip install qiskit==0.46.0
          pip install qiskit-ibm-runtime==0.21.0
          pip install pennylane==0.35.0
          pip install pennylane-qiskit==0.35.0
          pip install yfinance pandas numpy autoray==0.6.7
          
      - name: Correr Oráculo
        env:
          IBM_QUANTUM_TOKEN: ${{ secrets.IBM_QUANTUM_TOKEN }}
        run: python bot_cuantico.py

      - name: Guardar cambios
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add backtest_cuantico.csv
          git commit -m "Update backtest" || echo "No changes"
          git push
