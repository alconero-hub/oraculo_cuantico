name: Oráculo Cuántico 2026

on:
  schedule:
    - cron: '5 */2 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalación
        run: pip install qiskit qiskit-ibm-runtime pennylane pennylane-qiskit yfinance pandas numpy matplotlib
      - name: Ejecución
        env:
          IBM_QUANTUM_TOKEN: ${{ secrets.IBM_QUANTUM_TOKEN }}
        run: |
          python bot_cuantico.py
          python graficar_rendimiento.py
      - name: Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'Quantum Bot'
          git config --global user.email 'bot@quantum.com'
          git add .
          git commit -m "📊 Update Cuántico [$(date)]" || echo "No changes"
          git push origin main
