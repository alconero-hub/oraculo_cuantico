name: Oráculo Cuántico 2026

on:
  schedule:
    - cron: '5 */2 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalación
        run: pip install qiskit qiskit-ibm-runtime pennylane pennylane-qiskit yfinance pandas numpy matplotlib
      - name: Ejecución
        env:
          IBM_QUANTUM_TOKEN: ${{ secrets.IBM_QUANTUM_TOKEN }}
        run: |
          python bot_cuantico.py
          python graficar_rendimiento.py
          ls -la # Verificamos que los archivos existan
      - name: 🚀 Publicar Resultados
        run: |
          git config --global user.name 'Quantum Bot'
          git config --global user.email 'bot@quantum.com'
          git add README.md backtest_cuantico.csv rendimiento_cuantico.png
          git commit -m "📊 Veredicto: $(date)" || echo "Sin cambios"
          git push origin main
          # Solo hace commit si hay cambios reales para evitar bucles
          git commit -m "📊 Update: Oráculo Cuántico [$(date +'%Y-%m-%d %H:%M')]" || echo "Sin cambios para commitear"
          
          # Push con reintento por si hay colisiones
          git push origin main || (git pull --rebase origin main && git push origin main)
