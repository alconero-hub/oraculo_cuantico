name: Oráculo Cuántico en Docker
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Construir y Correr Contenedor
        env:
          IBM_QUANTUM_TOKEN: ${{ secrets.IBM_QUANTUM_TOKEN }}
        run: |
          # 1. Construimos la imagen con normalidad
          docker build -t q-bot .
          
          # 2. Corremos con '--network host' para que tenga internet sin restricciones
          docker run --name running-bot \
            --network host \
            --dns 8.8.8.8 \
            -e IBM_QUANTUM_TOKEN=${{ secrets.IBM_QUANTUM_TOKEN }} \
            q-bot
          
          # 3. Extraemos el resultado
          docker cp running-bot:/app/backtest_cuantico.csv ./backtest_cuantico.csv

      - name: Push de resultados
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add backtest_cuantico.csv
          git commit -m "Update backtest via Docker" || echo "No changes"
          git push
