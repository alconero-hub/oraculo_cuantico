name: Oráculo Cuántico 2026

on:
  schedule:
    - cron: '5 */2 * * *' # Ejecuta cada 2 horas (02:05, 04:05, etc.)
  workflow_dispatch:      # Permite dispararlo manualmente

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install qiskit qiskit-ibm-runtime pennylane pennylane-qiskit yfinance pandas numpy matplotlib

      - name: 🧠 Ejecutar Oráculo y Graficador
        env:
          IBM_QUANTUM_TOKEN: ${{ secrets.IBM_QUANTUM_TOKEN }}
        run: |
          python bot_cuantico.py
          python graficar_rendimiento.py

      - name: 💾 Subir Cambios
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'Quantum Bot'
          git config --global user.email 'bot@quantum.com'
          git add .
          git commit -m "📊 Update: Estrategia Cuántica con Ahorro [$(date)]" || echo "No changes"
          git push origin main
