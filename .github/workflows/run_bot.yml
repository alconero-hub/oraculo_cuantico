name: Oráculo Cuántico Pro
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Versión moderna para Qiskit 1.x

      - name: Instalación Moderna
        run: |
          pip install --upgrade pip
          pip install qiskit qiskit-ibm-runtime pennylane pennylane-qiskit yfinance pandas numpy

      - name: Correr Oráculo
        env:
          IBM_QUANTUM_TOKEN: ${{ secrets.IBM_QUANTUM_TOKEN }}
        run: python bot_cuantico.py

      - name: Guardar cambios
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add backtest_cuantico.csv
          git commit -m "Update prediction" || echo "No changes"
          git push
