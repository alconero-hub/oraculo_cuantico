name: Ejecución Horaria del Oráculo
on:
  schedule:
    - cron: '0 * * * *'  # Se ejecuta cada hora en punto
  workflow_dispatch:      # Permite lanzarlo a mano con un botón

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3
      
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: 🔥 Limpieza y Reinstalación Total (Evita conflicto 1.0)
        run: |
          # 1. Eliminamos cualquier rastro que cause el conflicto de versiones
          pip uninstall -y qiskit qiskit-terra qiskit-ibm-runtime pennylane-qiskit
          
          # 2. Instalamos el "Pack de Estabilidad" en orden crítico
          pip install qiskit==0.45.2
          pip install qiskit-ibm-runtime==0.20.0
          pip install pennylane==0.33.1
          pip install pennylane-qiskit==0.33.0
          pip install autoray==0.6.7
          pip install yfinance pandas numpy
        
      - name: Correr Oráculo
        env:
          IBM_QUANTUM_TOKEN: ${{ secrets.IBM_QUANTUM_TOKEN }}
        run: python bot_cuantico.py
        
      - name: Guardar cambios en CSV
        run: |
          git config --global user.name 'QuantumBot'
          git config --global user.email 'bot@github.com'
          git add backtest_cuantico.csv
          git commit -m "Actualización de predicción cuántica" || echo "No hay cambios"
          git push
