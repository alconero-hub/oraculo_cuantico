name: Oráculo Cuántico Final
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 🔥 Instalación Ultra-Estable
        run: |
          # Limpiamos cualquier rastro de versiones viejas
          pip uninstall -y qiskit qiskit-terra qiskit-ibm-runtime pennylane-qiskit
          
          # Instalamos las versiones modernas que SÍ resuelven el DNS de IBM
          pip install qiskit>=1.0.0 qiskit-ibm-runtime pennylane pennylane-qiskit yfinance pandas numpy
          
      - name: Correr Oráculo
        env:
          IBM_QUANTUM_TOKEN: ${{ secrets.IBM_QUANTUM_TOKEN }}
        run: python bot_cuantico.py

      - name: Guardar cambios
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add backtest_cuantico.csv
          git commit -m "Update backtest" || echo "No changes"
          git push
