name: Oráculo Cuántico 16-Qubits

on:
  schedule:
    - cron: '5 */1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar Dependencias
        run: |
          pip install yfinance pandas numpy matplotlib pennylane pennylane-qiskit qiskit-ibm-runtime

      - name: Ejecutar Bot
        env:
          IBM_QUANTUM_TOKEN: ${{ secrets.IBM_QUANTUM_TOKEN }}
        run: python bot_cuantico.py

      - name: Generar Gráfica
        run: python graficar_rendimiento.py || echo "No se pudo generar la gráfica"

      - name: Publicar Resultados
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'Quantum Bot 16Q'
          git config --global user.email 'bot@quantum.com'
          git add README.md backtest_cuantico.csv rendimiento_cuantico.png pesos_cuanticos_16.npy || true
          git commit -m "🧠 Update 16Q: Aprendizaje y Veredicto [$(date)]" || echo "Sin cambios"
          git push origin main || (git pull --rebase origin main && git push origin main)
