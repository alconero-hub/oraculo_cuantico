name: Ejecución Cuántica Protegida (Docker)
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-oracle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Build and Run Docker
        env:
          IBM_QUANTUM_TOKEN: ${{ secrets.IBM_QUANTUM_TOKEN }}
        run: |
          # Construimos la imagen
          docker build -t oraculo-bot .
          
          # La ejecutamos pasando el Token
          docker run --name bot-container -e IBM_QUANTUM_TOKEN=$IBM_QUANTUM_TOKEN oraculo-bot
          
          # Sacamos el archivo CSV actualizado de la "caja" para guardarlo en GitHub
          docker cp bot-container:/backtest_cuantico.csv ./backtest_cuantico.csv

      - name: Guardar cambios
        run: |
          git config --global user.name 'QuantumBot'
          git config --global user.email 'bot@github.com'
          git add backtest_cuantico.csv
          git commit -m "Actualización desde Docker" || echo "Sin cambios"
          git push
